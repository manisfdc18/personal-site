<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web-to-Lead Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background: #0070d2;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            border: none;
        }
        input[type="submit"]:hover {
            background: #005fb2;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Web-to-Lead Form</h2>
        <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Df600000HWa6d" method="POST">

            <!-- Hidden Fields -->
            <input type="hidden" name="oid" value="00Df600000HWa6d">
            <input type="hidden" name="retURL" value="http://www.google.com">

            <!-- First Name -->
            <label for="first_name">First Name</label>
            <input id="first_name" name="first_name" type="text" maxlength="40" required>

            <!-- Last Name -->
            <label for="last_name">Last Name</label>
            <input id="last_name" name="last_name" type="text" maxlength="80" required>

            <!-- Email -->
            <label for="email">Email</label>
            <input id="email" name="email" type="email" maxlength="80" required>

            <!-- Company -->
            <label for="company">Company</label>
            <input id="company" name="company" type="text" maxlength="40">

            <!-- City -->
            <label for="city">City</label>
            <input id="city" name="city" type="text" maxlength="40">

            <!-- Country -->
            <label for="country_code">Country</label>
            <select id="country_code" name="country_code" required>
                <option value="">--Select Country--</option>
                <option value="IN">India</option>
                <option value="US">United States</option>
                <option value="GB">United Kingdom</option>
                <option value="AU">Australia</option>
                <!-- Add more countries as needed -->
            </select>

            <!-- State -->
            <label for="state_code">State/Province</label>
            <select id="state_code" name="state_code">
                <option value="">--Select State--</option>
                <option value="CA">California</option>
                <option value="TX">Texas</option>
                <option value="TN">Tamil Nadu</option>
                <option value="MH">Maharashtra</option>
                <!-- Add more states as needed -->
            </select>

            <!-- Submit -->
            <input type="submit" value="Submit Lead">
        </form>
    </div>
</body>
</html>
